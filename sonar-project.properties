# 项目标识
sonar.projectKey=my-chat-langchain
sonar.projectName=My Chat LangChain
sonar.projectVersion=1.0

# 多语言源码
sonar.sources=api,backend,frontend

# 排除依赖/生成文件
sonar.exclusions=**/node_modules/**,**/*.log,**/__pycache__/**,**/.venv/**,**/dist/**

# Python 版本设定
sonar.python.version=3.11

# 前端文件类型
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx

# 端口
sonar.host.url=http://localhost:9000

# token
sonar.login=YOUR_TOKEN